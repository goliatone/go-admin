{% extends "site/error.html" %}

{% block title %}Not Found · CMS Demo{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto bg-white rounded-2xl shadow border border-slate-100 p-8 space-y-4">
  <p class="text-xs uppercase tracking-[0.2em] text-slate-500">404</p>
  <h1 class="text-3xl font-semibold text-slate-900">Page not found</h1>
  <p class="text-slate-600">The requested content could not be resolved.</p>
  {% if requested_locale %}
    <p class="text-slate-500">Requested locale: {{ requested_locale }}</p>
  {% endif %}
</section>
{% endblock %}
