{% if debug_jserror_enabled %}
<script>
  // Global JS error collector — synchronous IIFE, runs before module scripts.
  // Captures uncaught exceptions, unhandled rejections, console.error calls,
  // and network errors (failed fetch/XHR), then batches them to the debug
  // backend via sendBeacon/fetch.
  // Independent of the debug toolbar; controlled by CaptureJSErrors config flag.
  (function() {
    var endpoint = '{{ debug_jserror_endpoint }}';
    var nonce = '{{ debug_jserror_nonce }}';
    var queue = [];
    var sending = false;
    var MAX_QUEUE = 50;
	    var FLUSH_MS = 2000;
	    var __dbgSending = false;
	    var origFetch = window.fetch;
	    var FORMGEN_SUPERSEDED_ABORT_REASON = 'formgen:resolver-superseded';
	    var EXPECTED_FETCH_ABORT_REASONS = {};
	    EXPECTED_FETCH_ABORT_REASONS[FORMGEN_SUPERSEDED_ABORT_REASON] = true;

    function report(entry) {
      if (queue.length >= MAX_QUEUE) return;
      entry.url = entry.url || location.href;
      entry.user_agent = entry.user_agent || navigator.userAgent;
      entry.nonce = nonce;
      queue.push(entry);
      scheduleFlush();
    }

    function scheduleFlush() {
      if (sending) return;
      sending = true;
      setTimeout(flush, FLUSH_MS);
    }

    function flush() {
      sending = false;
      if (queue.length === 0) return;
      var batch = queue.splice(0, MAX_QUEUE);
      __dbgSending = true;
      for (var i = 0; i < batch.length; i++) {
        var body = JSON.stringify(batch[i]);
        try {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(endpoint, new Blob([body], { type: 'application/json' }));
          } else {
            var headers = window.goAdminCSRFHeaders
              ? window.goAdminCSRFHeaders({ 'Content-Type': 'application/json' })
              : { 'Content-Type': 'application/json' };
            origFetch(endpoint, {
              method: 'POST',
              body: body,
              headers: headers,
              keepalive: true,
              credentials: 'same-origin'
            }).catch(function() {});
          }
        } catch (e) {
          // Silently ignore send failures to avoid error loops.
        }
      }
      __dbgSending = false;
    }

    function signalFromFetchArgs(input, init) {
      if (init && init.signal) {
        return init.signal;
      }
      if (input && typeof input === 'object' && input.signal) {
        return input.signal;
      }
      return null;
    }

	    function stringifyAbortReason(reason) {
	      if (reason == null) {
	        return '';
      }
      if (typeof reason === 'string') {
        return reason;
      }
      if (reason && reason.message) {
        return String(reason.message);
      }
      try {
        return String(reason);
      } catch (e) {
        return '';
	      }
	    }

	    function isExpectedFetchAbortReason(reason) {
	      return !!(reason && EXPECTED_FETCH_ABORT_REASONS[reason]);
	    }

	    function fetchAbortInfo(err, signal) {
	      var signalAborted = !!(signal && signal.aborted);
	      var errorAbort = !!(err && err.name === 'AbortError');
	      if (!signalAborted && !errorAbort) {
        return null;
      }
      var reason = signal && 'reason' in signal ? stringifyAbortReason(signal.reason) : '';
	      if (!reason) {
	        reason = stringifyAbortReason(err);
	      }
	      var expected = isExpectedFetchAbortReason(reason);
	      return {
	        reason: reason,
	        expected: expected,
	        intentional: expected
	      };
	    }

    // 1. Uncaught exceptions
    window.addEventListener('error', function(e) {
      report({
        type: 'uncaught',
        message: e.message || String(e),
        source: e.filename || '',
        line: e.lineno || 0,
        column: e.colno || 0,
        stack: (e.error && e.error.stack) ? e.error.stack : ''
      });
    });

    // 2. Unhandled promise rejections
    window.addEventListener('unhandledrejection', function(e) {
      var reason = e.reason;
      report({
        type: 'unhandled_rejection',
        message: (reason && reason.message) ? reason.message : String(reason),
        stack: (reason && reason.stack) ? reason.stack : ''
      });
    });

    // 3. console.error override with recursion guard
    var origError = console.error;
    var inOverride = false;
    console.error = function() {
      if (inOverride) {
        return origError.apply(console, arguments);
      }
      inOverride = true;
      try {
        var args = Array.prototype.slice.call(arguments);
        report({
          type: 'console_error',
          message: args.map(String).join(' ')
        });
      } catch (e) {
        // Never suppress the original console.error.
      } finally {
        inOverride = false;
      }
      return origError.apply(console, arguments);
    };

    // 4. Network errors: intercept fetch()
    if (typeof origFetch === 'function') {
      window.fetch = function(input, init) {
        var promise = origFetch.apply(this, arguments);
        if (__dbgSending) return promise;
        var signal = signalFromFetchArgs(input, init);

        var method = 'GET';
        var url = '';
        if (typeof input === 'string') {
          url = input;
        } else if (input && typeof input === 'object') {
          url = input.url || '';
          method = (input.method || 'GET').toUpperCase();
        }
        if (init && init.method) {
          method = init.method.toUpperCase();
        }
        if (url === endpoint) return promise;

	        return promise.then(function(response) {
          if (!response.ok) {
            report({
              type: 'network_error',
              message: method + ' ' + url + ' ' + response.status + ' (' + (response.statusText || 'Error') + ')',
              extra: { method: method, status: response.status, status_text: response.statusText || '', request_url: url }
            });
          }
          return response;
	        }, function(err) {
	          var abortInfo = fetchAbortInfo(err, signal);
	          if (abortInfo) {
	            if (abortInfo.expected) {
	              throw err;
	            }
	            report({
	              type: 'network_abort',
              message: method + ' ' + url + ' aborted' + (abortInfo.reason ? ': ' + abortInfo.reason : ''),
              extra: {
                method: method,
                status: 0,
                status_text: 'Aborted',
                request_url: url,
                aborted: true,
                abort_reason: abortInfo.reason,
                intentional: abortInfo.intentional
              }
            });
          } else {
            report({
              type: 'network_error',
              message: method + ' ' + url + ' failed: ' + (err && err.message ? err.message : String(err)),
              extra: { method: method, status: 0, status_text: 'Network Error', request_url: url }
            });
          }
          throw err;
        });
      };
    }

    // 5. Network errors: intercept XMLHttpRequest
    var origXHROpen = XMLHttpRequest.prototype.open;
    var origXHRSend = XMLHttpRequest.prototype.send;

    XMLHttpRequest.prototype.open = function(method, url) {
      this.__dbgMethod = (method || 'GET').toUpperCase();
      this.__dbgURL = url || '';
      return origXHROpen.apply(this, arguments);
    };

    XMLHttpRequest.prototype.send = function() {
      var xhr = this;
      var method = xhr.__dbgMethod || 'GET';
      var url = xhr.__dbgURL || '';

      if (!__dbgSending && url !== endpoint) {
        xhr.addEventListener('loadend', function() {
          if (__dbgSending) return;
          if (xhr.status === 0 || xhr.status >= 400) {
            var statusText = '';
            try { statusText = xhr.statusText || ''; } catch(e) {}
            var msg = xhr.status === 0
              ? method + ' ' + url + ' failed: Network Error'
              : method + ' ' + url + ' ' + xhr.status + ' (' + (statusText || 'Error') + ')';
            report({
              type: 'network_error',
              message: msg,
              extra: { method: method, status: xhr.status, status_text: statusText, request_url: url }
            });
          }
        });
      }
      return origXHRSend.apply(this, arguments);
    };

    // Flush remaining errors on page unload
    window.addEventListener('pagehide', flush);
  })();
</script>
{% endif %}
