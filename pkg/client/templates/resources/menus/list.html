{% extends "layout.html" %}

{% block title %}Menu Builder - {{ title }}{% endblock %}

{% block content %}
<header class="px-6 py-4 bg-white border-b border-gray-200 flex items-center justify-between">
  <div>
    <h1 class="text-xl font-bold text-gray-900">Menu Builder</h1>
    <p class="text-xs text-gray-500 mt-1">Manage menus, bindings, profiles, and preview navigation output.</p>
  </div>
  <div class="text-xs text-gray-500">
    API: <code class="bg-gray-100 px-1.5 py-0.5 rounded">{{ api_base_path|default:base_path|default:"/admin" }}</code>
  </div>
</header>

<div class="flex-1 p-6 overflow-y-auto space-y-3">
  <div data-menu-builder-error class="hidden rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></div>
  <div
    data-menu-builder-root
    data-base-path="{{ base_path|default:"/admin" }}"
    data-api-base-path="{{ api_base_path|default:base_path|default:"/admin" }}"
  ></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ base_path }}/assets/dist/menu-builder/index.js"></script>
{% endblock %}
